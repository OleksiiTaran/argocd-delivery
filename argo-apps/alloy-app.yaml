apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-alloy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/OleksiiTaran/argocd-delivery.git # <--- Заміни на своє посилання!
    targetRevision: HEAD
    path: infrastructure/grafana-alloy # <--- Шлях до нашого локального чарта
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
