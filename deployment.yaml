apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: myapp-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-server
  template:
    metadata:
      labels:
        app: web-server
    spec:
      containers:
      - name: nginx
        image: nginx:1.25.1
        ports:
        - containerPort: 80
